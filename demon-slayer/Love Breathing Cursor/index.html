<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Breathing Cursor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(
          ellipse at 50% 60%,
          #1a0010 0%,
          #0a0008 45%,
          #000 100%
        );
      }
      .mitsuri-bg {
        position: fixed;
        top: -5%;
        left: -5%;
        width: 110%;
        height: 110%;
        z-index: 1;
        background-image: url("bg.png");
        background-size: cover;
        background-position: center;
        opacity: 0.89;
        pointer-events: none;
        will-change: transform;
        transition: opacity 0.3s;
      }
      body.aura-active .mitsuri-bg {
        opacity: 0.26;
      }
      #c {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      #hd {
        position: fixed;
        inset: 0;
        z-index: 9;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="mitsuri-bg" id="tbg"></div>
    <canvas id="hd"></canvas>
    <canvas id="c"></canvas>

    <script>
      (function () {
        "use strict";

        /* ── Canvas & DPR ── */
        const C = document.getElementById("c");
        const ctx = C.getContext("2d");
        const HD = document.getElementById("hd");
        const hctx = HD.getContext("2d");
        let W, H, dpr;

        function resize() {
          dpr = Math.min(devicePixelRatio || 1, 2);
          W = innerWidth;
          H = innerHeight;
          C.width = W * dpr;
          C.height = H * dpr;
          C.style.width = W + "px";
          C.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          HD.width = W * dpr;
          HD.height = H * dpr;
          HD.style.width = W + "px";
          HD.style.height = H + "px";
          hctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        addEventListener("resize", resize);
        resize();

        /* ── Math helpers ── */
        const lerp = (a, b, t) => a + (b - a) * t;
        const rand = (a, b) => a + Math.random() * (b - a);
        const randi = (a, b) => (a + Math.random() * (b - a)) | 0;
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const TAU = Math.PI * 2;

        /* ══════════════════════════════════════════════════
   LOVE BREATHING COLOR SYSTEM
   Pink  → Magenta → Rose-gold → Soft Crimson → Pearl
══════════════════════════════════════════════════ */
        const LUT_R = new Uint8Array(256);
        const LUT_G = new Uint8Array(256);
        const LUT_B = new Uint8Array(256);
        (function () {
          const stops = [
            [0, [0, 0, 0]],
            [28, [40, 0, 18]],
            [65, [160, 20, 80]],
            [110, [230, 60, 120]],
            [150, [255, 100, 160]],
            [190, [255, 150, 180]],
            [225, [255, 200, 210]],
            [255, [255, 240, 245]],
          ];
          for (let i = 0; i < 256; i++) {
            for (let s = 0; s < stops.length - 1; s++) {
              const [t0, c0] = stops[s],
                [t1, c1] = stops[s + 1];
              if (i >= t0 && i <= t1) {
                const f = (i - t0) / (t1 - t0);
                LUT_R[i] = (c0[0] + (c1[0] - c0[0]) * f) | 0;
                LUT_G[i] = (c0[1] + (c1[1] - c0[1]) * f) | 0;
                LUT_B[i] = (c0[2] + (c1[2] - c0[2]) * f) | 0;
                break;
              }
            }
          }
        })();

        /* Rose-gold / warm crimson accent LUT */
        const GLUT_R = new Uint8Array(256);
        const GLUT_G = new Uint8Array(256);
        const GLUT_B = new Uint8Array(256);
        (function () {
          const stops = [
            [0, [0, 0, 0]],
            [45, [50, 10, 10]],
            [100, [160, 50, 30]],
            [155, [220, 110, 60]],
            [200, [255, 170, 100]],
            [255, [255, 220, 180]],
          ];
          for (let i = 0; i < 256; i++) {
            for (let s = 0; s < stops.length - 1; s++) {
              const [t0, c0] = stops[s],
                [t1, c1] = stops[s + 1];
              if (i >= t0 && i <= t1) {
                const f = (i - t0) / (t1 - t0);
                GLUT_R[i] = (c0[0] + (c1[0] - c0[0]) * f) | 0;
                GLUT_G[i] = (c0[1] + (c1[1] - c0[1]) * f) | 0;
                GLUT_B[i] = (c0[2] + (c1[2] - c0[2]) * f) | 0;
                break;
              }
            }
          }
        })();

        function loveColor(t, a) {
          const i = clamp(t * 255, 0, 255) | 0;
          return `rgba(${LUT_R[i]},${LUT_G[i]},${LUT_B[i]},${a})`;
        }
        function goldColor(t, a) {
          const i = clamp(t * 255, 0, 255) | 0;
          return `rgba(${GLUT_R[i]},${GLUT_G[i]},${GLUT_B[i]},${a})`;
        }

        /* ── Pointer state ── */
        const P = {
          x: W / 2,
          y: H / 2,
          tx: W / 2,
          ty: H / 2,
          px: W / 2,
          py: H / 2,
          vx: 0,
          vy: 0,
          speed: 0,
          lastMove: 0,
        };
        function setTarget(x, y) {
          P.tx = x;
          P.ty = y;
          P.lastMove = performance.now();
        }
        addEventListener("mousemove", (e) => setTarget(e.clientX, e.clientY));
        addEventListener(
          "touchmove",
          (e) => {
            if (e.touches.length)
              setTarget(e.touches[0].clientX, e.touches[0].clientY);
          },
          { passive: true },
        );

        addEventListener("mousedown", (e) => {
          document.body.classList.add("aura-active");
          burst(e.clientX, e.clientY);
        });
        addEventListener("mouseup", () =>
          document.body.classList.remove("aura-active"),
        );
        addEventListener("mouseleave", () =>
          document.body.classList.remove("aura-active"),
        );
        addEventListener(
          "touchstart",
          (e) => {
            document.body.classList.add("aura-active");
            if (e.touches.length) {
              setTarget(e.touches[0].clientX, e.touches[0].clientY);
              burst(P.tx, P.ty);
            }
          },
          { passive: true },
        );
        addEventListener("touchend", () =>
          document.body.classList.remove("aura-active"),
        );

        /* ══════════════════════════════════════════
   PARTICLE POOLS
══════════════════════════════════════════ */

        /* — Petal / sparkle motes — */
        const EMAX = 650;
        const embers = [];
        for (let i = 0; i < EMAX; i++) embers.push({ alive: false });
        let eHead = 0;
        function spawnEmber(x, y, vx, vy, life, sz, hot, gold, spin) {
          const e = embers[eHead % EMAX];
          eHead++;
          e.alive = true;
          e.x = x;
          e.y = y;
          e.vx = vx;
          e.vy = vy;
          e.age = 0;
          e.life = life;
          e.sz = sz;
          e.hot = hot;
          e.sway = rand(0.3, 1.3);
          e.phase = rand(0, TAU);
          e.grav = rand(-8, 22);
          e.gold = gold || false;
          e.rot = rand(0, TAU);
          e.rotSpd = spin || rand(-4, 4);
          e.isPetal = Math.random() < 0.35;
        }

        /* — Ribbon / silk wisps (replaces smoke) — */
        const SMAX = 320;
        const ribbons = [];
        for (let i = 0; i < SMAX; i++) ribbons.push({ alive: false });
        let sHead = 0;
        function spawnRibbon(x, y, vx, vy, r, life, gold) {
          const s = ribbons[sHead % SMAX];
          sHead++;
          s.alive = true;
          s.x = x;
          s.y = y;
          s.vx = vx;
          s.vy = vy;
          s.age = 0;
          s.life = life;
          s.r = r;
          s.gold = gold || false;
          s.wave = rand(0, TAU);
          s.waveSpd = rand(2, 5);
        }

        /* — Love energy puffs — */
        const FMAX = 360;
        const flames = [];
        for (let i = 0; i < FMAX; i++) flames.push({ alive: false });
        let fHead = 0;
        function spawnFlame(x, y, vx, vy, r, life, hot, gold) {
          const f = flames[fHead % FMAX];
          fHead++;
          f.alive = true;
          f.x = x;
          f.y = y;
          f.vx = vx;
          f.vy = vy;
          f.age = 0;
          f.life = life;
          f.r = r;
          f.hot = hot;
          f.gold = gold || false;
        }

        /* — Hearts (the signature element) — */
        const HMAX = 180;
        const hearts = [];
        for (let i = 0; i < HMAX; i++) hearts.push({ alive: false });
        let hHead = 0;
        function spawnHeart(x, y, vx, vy, r, life, hot, gold) {
          const h = hearts[hHead % HMAX];
          hHead++;
          h.alive = true;
          h.x = x;
          h.y = y;
          h.vx = vx;
          h.vy = vy;
          h.age = 0;
          h.life = life;
          h.r = r;
          h.hot = hot;
          h.gold = gold || false;
          h.rot = rand(0, TAU);
          h.rotSpd = rand(-2.5, 2.5);
          h.pulse = rand(0, TAU);
          h.pulseSpd = rand(3, 7);
        }

        /* — Sparkle stars — */
        const SPKMAX = 420;
        const sparks = [];
        for (let i = 0; i < SPKMAX; i++)
          sparks.push({ alive: false, px: 0, py: 0 });
        let spkHead = 0;
        function spawnSpark(x, y, vx, vy, life, bright, gold) {
          const s = sparks[spkHead % SPKMAX];
          spkHead++;
          s.alive = true;
          s.x = x;
          s.y = y;
          s.px = x;
          s.py = y;
          s.vx = vx;
          s.vy = vy;
          s.age = 0;
          s.life = life;
          s.bright = bright;
          s.gold = gold || false;
          s.star = Math.random() < 0.4;
        }

        /* — Shockwaves & flashes — */
        const waves = [];
        const flashes = [];

        /* — Ambient glow cells — */
        const HDMAX = 200;
        const hdCells = [];
        for (let i = 0; i < HDMAX; i++) hdCells.push({ alive: false });
        let hdHead = 0;
        function spawnHD(x, y, str, life) {
          const h = hdCells[hdHead % HDMAX];
          hdHead++;
          h.alive = true;
          h.x = x;
          h.y = y;
          h.str = str;
          h.age = 0;
          h.life = life;
        }

        /* — Trail points — */
        const TMAX = 75;
        const trail = [];

        /* ══════════════════════════════════════════
   DRAW PRIMITIVES
══════════════════════════════════════════ */

        /* Heart path — classic parametric heart, centered at (0,0), radius r */
        function heartPath(cx, cy, r, angle) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle);
          ctx.scale(r, r);
          ctx.beginPath();
          // top-left bump
          ctx.moveTo(0, -0.5);
          ctx.bezierCurveTo(0.5, -1.0, 1.05, -0.5, 0.0, 0.55);
          ctx.bezierCurveTo(-1.05, -0.5, -0.5, -1.0, 0.0, -0.5);
          ctx.closePath();
          ctx.restore();
        }

        /* 4-point star sparkle at (cx,cy) with outer radius r */
        function starPath(cx, cy, r, angle) {
          const ir = r * 0.38;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle);
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * TAU;
            const rad = i % 2 === 0 ? r : ir;
            i === 0
              ? ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad)
              : ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
          }
          ctx.closePath();
          ctx.restore();
        }

        /* ── Love Breathing Burst — First Form: Shivers of First Love ── */
        function burst(x, y) {
          waves.push({ x, y, r: 0, maxR: rand(190, 290), age: 0, life: 680 });
          flashes.push({ x, y, r: 0, maxR: rand(270, 410), age: 0, life: 560 });

          /* Heart volley in all directions */
          const HJETS = 20;
          for (let i = 0; i < HJETS; i++) {
            const a = (i / HJETS) * TAU + rand(-0.14, 0.14);
            const spd = rand(130, 390);
            const isGold = Math.random() < 0.28;
            spawnHeart(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd,
              rand(14, 42),
              rand(420, 860),
              rand(0.65, 1.0),
              isGold,
            );
            spawnFlame(
              x,
              y,
              Math.cos(a) * spd * 0.48,
              Math.sin(a) * spd * 0.48,
              rand(20, 50),
              rand(340, 720),
              rand(0.6, 1.0),
              isGold,
            );
            if (i % 2 === 0)
              spawnRibbon(
                x + rand(-8, 8),
                y + rand(-8, 8),
                Math.cos(a) * spd * 0.2,
                Math.sin(a) * spd * 0.2 - rand(28, 58),
                rand(18, 36),
                rand(560, 900),
                isGold,
              );
          }

          /* Extra bloom of hearts at close range */
          for (let i = 0; i < 14; i++) {
            const a = rand(0, TAU),
              spd = rand(40, 130);
            spawnHeart(
              x + rand(-12, 12),
              y + rand(-12, 12),
              Math.cos(a) * spd,
              Math.sin(a) * spd - rand(20, 60),
              rand(6, 18),
              rand(600, 1100),
              rand(0.5, 0.9),
              Math.random() < 0.4,
            );
          }

          /* Sparkle / petal shower */
          for (let i = 0; i < 150; i++) {
            const a = rand(0, TAU),
              spd = rand(80, 520);
            spawnSpark(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd,
              rand(300, 950),
              rand(0.7, 1.0),
              Math.random() < 0.3,
            );
          }

          /* Petal motes */
          for (let i = 0; i < 100; i++) {
            const a = rand(0, TAU) - Math.PI / 2,
              spd = rand(30, 210);
            spawnEmber(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd - rand(40, 120),
              rand(550, 1350),
              rand(1.5, 3.8),
              rand(0.5, 1.0),
              Math.random() < 0.22,
              rand(-5, 5),
            );
          }

          spawnHD(x, y, rand(9, 15), rand(600, 1000));
        }

        /* ── Trail helpers ── */
        function addTrail(x, y, t) {
          if (trail.length >= TMAX) trail.shift();
          trail.push({ x, y, t });
        }

        /* ══════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════ */
        let last = performance.now();
        let ambE = 0,
          ambF = 0,
          ambHD = 0,
          ambH = 0;

        function frame(now) {
          requestAnimationFrame(frame);
          const dt = Math.min(now - last, 33);
          last = now;
          const dtS = dt * 0.001;

          /* Pointer tracking */
          P.px = P.x;
          P.py = P.y;
          const ease = 1 - Math.pow(0.001, dtS * 5);
          P.x = lerp(P.x, P.tx, ease);
          P.y = lerp(P.y, P.ty, ease);
          P.vx = (P.x - P.px) / Math.max(dtS, 0.001);
          P.vy = (P.y - P.py) / Math.max(dtS, 0.001);
          P.speed = Math.hypot(P.vx, P.vy);

          /* Parallax bg */
          const bx = (P.tx / W - 0.5) * -34;
          const by = (P.ty / H - 0.5) * -34;
          document.getElementById("tbg").style.transform =
            `translate(${bx}px,${by}px) scale(1.08)`;

          /* Trail */
          addTrail(P.x, P.y, now);
          while (trail.length && now - trail[0].t > 400) trail.shift();

          const idle = now - P.lastMove;
          const moving = idle < 120;
          const speedFactor = clamp(P.speed / 300, 0, 1);

          /* ── Ambient emission ── */
          ambE -= dt;
          if (ambE <= 0) {
            ambE = moving ? rand(7, 20) : rand(26, 52);
            const n = moving ? randi(2, 5) : 1;
            for (let i = 0; i < n; i++) {
              const a = -Math.PI / 2 + rand(-1.1, 1.1);
              const spd = rand(14, 65) * (1 + speedFactor * 1.9);
              spawnEmber(
                P.x + rand(-5, 5),
                P.y + rand(-5, 5),
                Math.cos(a) * spd,
                Math.sin(a) * spd - rand(14, 44),
                rand(700, 1650),
                rand(1.0, 2.8),
                rand(0.4, 0.9),
                Math.random() < 0.12,
                rand(-3, 3),
              );
            }
          }

          ambF -= dt;
          if (ambF <= 0) {
            ambF = moving ? rand(10, 24) : rand(32, 62);
            const n = moving ? randi(2, 6) : randi(1, 3);
            for (let i = 0; i < n; i++) {
              const a = -Math.PI / 2 + rand(-1.1, 1.1);
              const spd = rand(11, 62) * (1 + speedFactor * 1.4);
              spawnFlame(
                P.x + rand(-6, 6),
                P.y + rand(-6, 6),
                Math.cos(a) * spd * 0.44,
                Math.sin(a) * spd - rand(8, 36),
                rand(8, 25) * (1 + speedFactor * 0.7),
                rand(155, 370),
                rand(0.4, 1.0),
                Math.random() < 0.09,
              );
            }
            if (Math.random() < (moving ? 0.38 : 0.09))
              spawnRibbon(
                P.x + rand(-8, 8),
                P.y - 8,
                rand(-13, 13),
                rand(-38, -12),
                rand(11, 23),
                rand(370, 660),
                false,
              );
          }

          /* Ambient hearts — float up gently */
          ambH -= dt;
          if (ambH <= 0) {
            ambH = moving ? rand(55, 130) : rand(180, 380);
            if (Math.random() < (moving ? 0.7 : 0.2)) {
              const a = -Math.PI / 2 + rand(-1.4, 1.4);
              const spd = rand(10, 55) * (1 + speedFactor * 1.2);
              spawnHeart(
                P.x + rand(-10, 10),
                P.y + rand(-10, 10),
                Math.cos(a) * spd,
                Math.sin(a) * spd - rand(5, 30),
                rand(5, 15),
                rand(600, 1300),
                rand(0.5, 0.95),
                Math.random() < 0.2,
              );
            }
          }

          ambHD -= dt;
          if (ambHD <= 0) {
            ambHD = rand(85, 165);
            spawnHD(
              P.x + rand(-16, 16),
              P.y + rand(-16, 16),
              rand(3, 6),
              rand(180, 370),
            );
          }

          /* Movement-triggered emission */
          if (moving && P.speed > 20) {
            const n = clamp((P.speed / 100) | 0, 1, 6);
            for (let i = 0; i < n; i++) {
              const t = Math.random();
              const sx = lerp(P.px, P.x, t),
                sy = lerp(P.py, P.y, t);
              const a = -Math.PI / 2 + rand(-1.2, 1.2);
              const spd = rand(26, 95) + speedFactor * 55;
              const isGold = Math.random() < 0.12;
              spawnFlame(
                sx + rand(-4, 4),
                sy + rand(-4, 4),
                P.vx * 0.1 + Math.cos(a) * spd * 0.4,
                -Math.abs(Math.sin(a) * spd) - rand(16, 48),
                rand(7, 19),
                rand(130, 310),
                rand(0.6, 1.0),
                isGold,
              );
              if (Math.random() < 0.44)
                spawnEmber(
                  sx,
                  sy,
                  P.vx * 0.07 + rand(-34, 34),
                  -rand(34, 118),
                  rand(480, 1100),
                  rand(1, 2.5),
                  rand(0.5, 1.0),
                  isGold,
                  rand(-3, 3),
                );
              if (P.speed > 120 && Math.random() < 0.26)
                spawnSpark(
                  sx,
                  sy,
                  P.vx * 0.18 + rand(-68, 68),
                  P.vy * 0.18 + rand(-68, 68),
                  rand(170, 460),
                  0.88,
                  isGold,
                );
              /* Hearts on fast sweeps */
              if (P.speed > 160 && Math.random() < 0.22) {
                const ha = Math.atan2(P.vy, P.vx) + rand(-0.6, 0.6);
                spawnHeart(
                  sx,
                  sy,
                  Math.cos(ha) * rand(50, 150),
                  Math.sin(ha) * rand(50, 150) - rand(10, 40),
                  rand(6, 16),
                  rand(240, 560),
                  rand(0.7, 1.0),
                  Math.random() < 0.18,
                );
              }
            }
          }

          /* ═══════════ DRAW ═══════════ */
          ctx.clearRect(0, 0, W, H);
          ctx.globalCompositeOperation = "lighter";

          /* ── Flashes — warm pink bloom ── */
          for (let i = flashes.length - 1; i >= 0; i--) {
            const f = flashes[i];
            f.age += dt;
            if (f.age >= f.life) {
              flashes.splice(i, 1);
              continue;
            }
            const tp = f.age / f.life;
            const r = lerp(0, f.maxR, Math.pow(tp, 0.28));
            const a = (1 - tp) * (1 - tp) * 0.34;
            const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
            g.addColorStop(0, `rgba(255,220,235,${a})`);
            g.addColorStop(0.25, `rgba(255,130,170,${a * 0.82})`);
            g.addColorStop(0.55, `rgba(200,40,100,${a * 0.48})`);
            g.addColorStop(0.8, `rgba(180,80,30,${a * 0.22})`);
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(f.x, f.y, r, 0, TAU);
            ctx.fill();
          }

          /* ── Shockwaves — rose rings ── */
          for (let i = waves.length - 1; i >= 0; i--) {
            const w = waves[i];
            w.age += dt;
            if (w.age >= w.life) {
              waves.splice(i, 1);
              continue;
            }
            const tp = w.age / w.life;
            const r = lerp(0, w.maxR, Math.pow(tp, 0.5));
            const a = (1 - tp) * (1 - tp) * 0.78;
            const lw = lerp(7, 0.4, tp);
            ctx.beginPath();
            ctx.arc(w.x, w.y, r, 0, TAU);
            ctx.lineWidth = lw;
            ctx.strokeStyle = `rgba(255,110,160,${a})`;
            ctx.stroke();
            ctx.lineWidth = lw * 3;
            ctx.strokeStyle = `rgba(200,50,100,${a * 0.34})`;
            ctx.stroke();
            if (tp < 0.42) {
              const r2 = lerp(0, w.maxR * 0.44, tp / 0.42);
              ctx.beginPath();
              ctx.arc(w.x, w.y, r2, 0, TAU);
              ctx.lineWidth = lw * 0.6;
              ctx.strokeStyle = `rgba(255,190,80,${a * 0.58})`;
              ctx.stroke();
            }
          }

          /* ── Ribbon wisps (source-over, drawn under energy) ── */
          ctx.globalCompositeOperation = "source-over";
          for (let i = 0; i < SMAX; i++) {
            const s = ribbons[i];
            if (!s.alive) continue;
            s.age += dt;
            if (s.age >= s.life) {
              s.alive = false;
              continue;
            }
            s.wave += s.waveSpd * dtS;
            s.x += (s.vx + Math.sin(s.wave) * 18) * dtS;
            s.y += s.vy * dtS;
            s.vy -= dtS * 7;
            const tp = s.age / s.life;
            const r = s.r * (1 + tp * 1.25);
            const a = (1 - tp) * 0.12 * Math.sin(tp * Math.PI);
            const col = s.gold
              ? `rgba(255,190,100,${a})`
              : `rgba(220,80,140,${a * 0.8})`;
            const g = ctx.createRadialGradient(
              s.x,
              s.y,
              0,
              s.x,
              s.y,
              Math.max(1, r),
            );
            g.addColorStop(0, col);
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(s.x, s.y, Math.max(1, r), 0, TAU);
            ctx.fill();
          }

          /* ── Love energy puffs ── */
          ctx.globalCompositeOperation = "lighter";
          for (let i = 0; i < FMAX; i++) {
            const f = flames[i];
            if (!f.alive) continue;
            f.age += dt;
            if (f.age >= f.life) {
              f.alive = false;
              continue;
            }
            f.x += f.vx * dtS;
            f.y += f.vy * dtS;
            f.vy -= dtS * 44;
            f.vx *= Math.pow(0.96, dtS * 60);
            f.vx += Math.sin(now * 0.006 + f.age * 0.009) * dtS * 28;
            const tp = f.age / f.life;
            const hotness = f.hot * (1 - tp);
            const r = f.r * (1 + tp * 0.3);
            const a = Math.sin(tp * Math.PI) * 0.68 * f.hot;
            const g = ctx.createRadialGradient(
              f.x,
              f.y,
              0,
              f.x,
              f.y,
              Math.max(1, r),
            );
            if (f.gold) {
              g.addColorStop(0, goldColor(hotness, a));
              g.addColorStop(0.45, goldColor(hotness * 0.6, a * 0.65));
              g.addColorStop(0.82, goldColor(hotness * 0.28, a * 0.26));
            } else {
              g.addColorStop(0, loveColor(hotness, a));
              g.addColorStop(0.45, loveColor(hotness * 0.6, a * 0.65));
              g.addColorStop(0.82, loveColor(hotness * 0.28, a * 0.26));
            }
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(f.x, f.y, Math.max(1, r), 0, TAU);
            ctx.fill();
          }

          /* ── Hearts ── */
          for (let i = 0; i < HMAX; i++) {
            const h = hearts[i];
            if (!h.alive) continue;
            h.age += dt;
            if (h.age >= h.life) {
              h.alive = false;
              continue;
            }
            h.x += h.vx * dtS;
            h.y += h.vy * dtS;
            h.vy -= dtS * 38;
            h.vx *= Math.pow(0.97, dtS * 60);
            h.vx += Math.sin(now * 0.005 + h.age * 0.008) * dtS * 22;
            h.rot += h.rotSpd * dtS;
            h.pulse += h.pulseSpd * dtS;
            const tp = h.age / h.life;
            const hotness = h.hot * (1 - tp);
            const pulse = 1 + 0.08 * Math.sin(h.pulse);
            const r = h.r * (1 + tp * 0.18) * pulse;
            const a = Math.sin(tp * Math.PI) * 0.78 * h.hot;
            if (a < 0.01) continue;

            /* Outer glow */
            const glowR = r * 2.8;
            const gg = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, glowR);
            if (h.gold) {
              gg.addColorStop(0, goldColor(hotness, a * 0.5));
              gg.addColorStop(1, "rgba(0,0,0,0)");
            } else {
              gg.addColorStop(0, loveColor(hotness, a * 0.45));
              gg.addColorStop(1, "rgba(0,0,0,0)");
            }
            ctx.fillStyle = gg;
            ctx.beginPath();
            ctx.arc(h.x, h.y, glowR, 0, TAU);
            ctx.fill();

            /* Heart fill */
            heartPath(h.x, h.y, r, h.rot);
            const hg = ctx.createRadialGradient(
              h.x,
              h.y - r * 0.1,
              0,
              h.x,
              h.y,
              r * 1.2,
            );
            if (h.gold) {
              hg.addColorStop(0, goldColor(1.0, a));
              hg.addColorStop(0.55, goldColor(0.7, a * 0.75));
              hg.addColorStop(1, goldColor(0.35, a * 0.3));
            } else {
              hg.addColorStop(0, loveColor(1.0, a));
              hg.addColorStop(0.55, loveColor(0.7, a * 0.75));
              hg.addColorStop(1, loveColor(0.35, a * 0.3));
            }
            ctx.fillStyle = hg;
            ctx.fill();
          }

          /* ── Trail — flowing love ribbon ── */
          if (trail.length >= 3) {
            for (let i = 1; i < trail.length; i++) {
              const age = (now - trail[i].t) / 400;
              const alpha = clamp(1 - age, 0, 1);
              if (alpha < 0.01) continue;
              const w = lerp(1.5, 10, 1 - age);
              ctx.beginPath();
              ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
              ctx.lineTo(trail[i].x, trail[i].y);
              /* deep rose outer glow */
              ctx.lineWidth = w * 4.8;
              ctx.strokeStyle = `rgba(140,10,60,${alpha * 0.16})`;
              ctx.stroke();
              /* magenta mid */
              ctx.lineWidth = w * 2.9;
              ctx.strokeStyle = `rgba(240,60,130,${alpha * 0.3})`;
              ctx.stroke();
              /* rose-gold accent */
              ctx.lineWidth = w * 1.7;
              ctx.strokeStyle = `rgba(255,160,90,${alpha * 0.22})`;
              ctx.stroke();
              /* pink-white core */
              ctx.lineWidth = w * 1.1;
              ctx.strokeStyle = `rgba(255,190,210,${alpha * 0.62})`;
              ctx.stroke();
              /* pearl spine */
              ctx.lineWidth = Math.max(0.8, w * 0.44);
              ctx.strokeStyle = `rgba(255,240,248,${alpha * 0.94})`;
              ctx.stroke();
            }
          }

          /* ── Sparkle streaks & stars ── */
          for (let i = 0; i < SPKMAX; i++) {
            const s = sparks[i];
            if (!s.alive) continue;
            s.age += dt;
            if (s.age >= s.life) {
              s.alive = false;
              continue;
            }
            s.px = s.x;
            s.py = s.y;
            s.x += s.vx * dtS;
            s.y += s.vy * dtS;
            s.vy += 145 * dtS;
            s.vx *= Math.pow(0.89, dtS * 60);
            const tp = s.age / s.life;
            const a = clamp((1 - tp) * (1 - tp) * s.bright * 1.2, 0, 1);
            const hotness = 1 - tp * 0.52;

            if (s.star) {
              /* 4-point star instead of streak */
              const sr = clamp((1 - tp) * 3.5, 0.5, 4);
              const sa = Math.atan2(s.y - s.py, s.x - s.px) * 0.5;
              ctx.save();
              starPath(s.x, s.y, sr, now * 0.003 + s.bright * 5);
              ctx.fillStyle = s.gold
                ? goldColor(hotness, a)
                : loveColor(hotness, a);
              ctx.fill();
              ctx.restore();
            } else {
              const tlen = Math.hypot(s.x - s.px, s.y - s.py);
              const slen = clamp(tlen, 2, 20);
              const ang = Math.atan2(s.y - s.py, s.x - s.px);
              ctx.setTransform(dpr, 0, 0, dpr, s.x, s.y);
              ctx.rotate(ang + Math.PI);
              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.lineTo(slen, 0);
              const gc = ctx.createLinearGradient(0, 0, slen, 0);
              if (s.gold) {
                gc.addColorStop(0, goldColor(hotness, a));
                gc.addColorStop(1, goldColor(hotness * 0.35, 0));
              } else {
                gc.addColorStop(0, loveColor(hotness, a));
                gc.addColorStop(1, loveColor(hotness * 0.35, 0));
              }
              ctx.strokeStyle = gc;
              ctx.lineWidth = clamp(2 - tp * 1.5, 0.4, 2);
              ctx.stroke();
              ctx.strokeStyle = s.gold
                ? goldColor(hotness, a * 0.24)
                : loveColor(hotness, a * 0.24);
              ctx.lineWidth = clamp(2 - tp * 1.5, 0.4, 2) * 2.2;
              ctx.stroke();
            }
          }
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          /* ── Petal / sparkle motes ── */
          for (let i = 0; i < EMAX; i++) {
            const e = embers[i];
            if (!e.alive) continue;
            e.age += dt;
            if (e.age >= e.life) {
              e.alive = false;
              continue;
            }
            e.x += e.vx * dtS + Math.sin(now * 0.0032 + e.phase) * e.sway * dtS;
            e.y += e.vy * dtS;
            e.vy += e.grav * dtS;
            e.vx *= Math.pow(0.976, dtS * 60);
            e.rot += e.rotSpd * dtS;
            const tp = e.age / e.life;
            const hotness = e.hot * (1 - tp * 0.62);
            const a = (1 - tp) * (1 - tp) * 0.93;
            const r = e.sz * (1 - tp * 0.28);
            if (r < 0.4) continue;

            if (e.isPetal) {
              /* Tiny ellipse for petal shape */
              ctx.save();
              ctx.translate(e.x, e.y);
              ctx.rotate(e.rot);
              ctx.scale(1, 0.55);
              ctx.beginPath();
              ctx.arc(0, 0, Math.max(0.4, r), 0, TAU);
              ctx.fillStyle = e.gold
                ? goldColor(hotness, a)
                : loveColor(hotness, a);
              ctx.fill();
              /* soft glow */
              ctx.scale(1, 1 / 0.55);
              ctx.scale(2.2, 2.2);
              ctx.beginPath();
              ctx.arc(0, 0, Math.max(0.4, r), 0, TAU);
              ctx.fillStyle = e.gold
                ? goldColor(clamp(hotness, 0, 1), a * 0.22)
                : loveColor(clamp(hotness, 0, 1), a * 0.22);
              ctx.fill();
              ctx.restore();
            } else {
              ctx.fillStyle = e.gold
                ? goldColor(hotness, a)
                : loveColor(hotness, a);
              ctx.beginPath();
              ctx.arc(e.x, e.y, Math.max(0.4, r), 0, TAU);
              ctx.fill();
              ctx.fillStyle = e.gold
                ? goldColor(clamp(hotness, 0, 1), a * 0.26)
                : loveColor(clamp(hotness, 0, 1), a * 0.26);
              ctx.beginPath();
              ctx.arc(e.x, e.y, Math.max(0.4, r * 2.3), 0, TAU);
              ctx.fill();
            }
          }

          /* ── Cursor tip — Love Breathing core ── */
          {
            /* Mitsuri's love-breathing rhythm: gentle, warm, organic */
            const breathe =
              0.87 +
              0.09 * Math.sin(now * 0.0092) +
              0.055 * Math.sin(now * 0.022 + 1.2) +
              0.035 * Math.sin(now * 0.039 + 2.5);
            const jx = Math.sin(now * 0.017) * 0.9;
            const jy = Math.sin(now * 0.014 + 1.9) * 0.9;
            const cx = P.x + jx,
              cy = P.y + jy;

            /* Far outer rosy aura */
            const vg = ctx.createRadialGradient(
              cx,
              cy,
              0,
              cx,
              cy,
              78 * breathe,
            );
            vg.addColorStop(0, `rgba(255,80,140,0.16)`);
            vg.addColorStop(0.5, `rgba(180,20,80,0.06)`);
            vg.addColorStop(1, `rgba(0,0,0,0)`);
            ctx.fillStyle = vg;
            ctx.beginPath();
            ctx.arc(cx, cy, 78 * breathe, 0, TAU);
            ctx.fill();

            /* Rose-gold warmth ring */
            const rg = ctx.createRadialGradient(
              cx,
              cy,
              16 * breathe,
              cx,
              cy,
              46 * breathe,
            );
            rg.addColorStop(0, "rgba(0,0,0,0)");
            rg.addColorStop(0.5, `rgba(255,160,80,0.11)`);
            rg.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = rg;
            ctx.beginPath();
            ctx.arc(cx, cy, 46 * breathe, 0, TAU);
            ctx.fill();

            /* Mid magenta bloom */
            const mg = ctx.createRadialGradient(
              cx,
              cy - 1.8,
              0,
              cx,
              cy,
              32 * breathe,
            );
            mg.addColorStop(0, `rgba(255,180,220,0.84)`);
            mg.addColorStop(0.28, `rgba(255,80,150,0.70)`);
            mg.addColorStop(0.65, `rgba(160,20,80,0.32)`);
            mg.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = mg;
            ctx.beginPath();
            ctx.arc(cx, cy - 1.8, 32 * breathe, 0, TAU);
            ctx.fill();

            /* Inner pink-white hot core */
            const hg = ctx.createRadialGradient(
              cx,
              cy,
              0,
              cx,
              cy,
              10 * breathe,
            );
            hg.addColorStop(0, `rgba(255,245,250,1)`);
            hg.addColorStop(0.38, `rgba(255,200,225,0.94)`);
            hg.addColorStop(0.72, `rgba(255,110,160,0.52)`);
            hg.addColorStop(1, "rgba(140,10,60,0)");
            ctx.fillStyle = hg;
            ctx.beginPath();
            ctx.arc(cx, cy, 10 * breathe, 0, TAU);
            ctx.fill();

            /* Orbiting hearts around cursor */
            const orbitA = now * 0.0022;
            const oa = {
              x: cx + Math.cos(orbitA) * 16 * breathe,
              y: cy + Math.sin(orbitA) * 16 * breathe,
            };
            const ob = {
              x: cx + Math.cos(orbitA + TAU / 3) * 14 * breathe,
              y: cy + Math.sin(orbitA + TAU / 3) * 14 * breathe,
            };
            const oc = {
              x: cx + Math.cos(orbitA + (2 * TAU) / 3) * 14 * breathe,
              y: cy + Math.sin(orbitA + (2 * TAU) / 3) * 14 * breathe,
            };

            const orbitHot = 0.9;
            const orbitAlpha = 0.62 * breathe;

            /* Heart A — pink */
            heartPath(oa.x, oa.y, 4.5 * breathe, orbitA * 0.4);
            ctx.fillStyle = loveColor(orbitHot, orbitAlpha);
            ctx.fill();

            /* Heart B — rose-gold */
            heartPath(ob.x, ob.y, 3.5 * breathe, orbitA * 0.4 + 1);
            ctx.fillStyle = goldColor(orbitHot, orbitAlpha * 0.85);
            ctx.fill();

            /* Heart C — magenta */
            heartPath(oc.x, oc.y, 3.0 * breathe, orbitA * 0.4 + 2);
            ctx.fillStyle = loveColor(0.75, orbitAlpha * 0.7);
            ctx.fill();

            /* Tiny pearl center */
            ctx.fillStyle = `rgba(255,255,255,${breathe * 0.96})`;
            ctx.beginPath();
            ctx.arc(cx, cy, 2.4 * breathe, 0, TAU);
            ctx.fill();
          }

          ctx.globalCompositeOperation = "source-over";

          /* ── Ambient glow layer on HD canvas ── */
          hctx.clearRect(0, 0, W, H);
          for (let i = 0; i < HDMAX; i++) {
            const h = hdCells[i];
            if (!h.alive) continue;
            h.age += dt;
            if (h.age >= h.life) {
              h.alive = false;
              continue;
            }
            const tp = h.age / h.life;
            const r = h.str * 17 * (1 - tp * 0.34);
            const a = (1 - tp) * 0.1;
            const g = hctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, r);
            g.addColorStop(0, `rgba(255,100,160,${a})`);
            g.addColorStop(0.5, `rgba(180,30,90,${a * 0.4})`);
            g.addColorStop(1, "rgba(0,0,0,0)");
            hctx.fillStyle = g;
            hctx.beginPath();
            hctx.arc(h.x, h.y, r, 0, TAU);
            hctx.fill();
          }
        }

        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
