<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thunder Cursor</title>
<style>
  :root {
    --gold-core:   255, 253, 235;
    --gold-mid:    255, 215, 70;
    --gold-outer:  255, 140, 0;
    --bg-deep:     #030206;
    --bg-mid:      #08050e;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 60%, #000 100%);
    cursor: none;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  /* Zenitsu Background Image Layer with Parallax Prep */
  .zenitsu-bg {
    position: fixed;
    top: -5%;
    left: -5%;
    width: 110%;
    height: 110%;
    z-index: 0;
    background-image: url('bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.6;
    pointer-events: none;
    will-change: transform;
    transform: scale(1.08); 
    transition: opacity 0.4s ease-out;
  }

  /* Aura Pressure Vibration Animation */
  @keyframes pressureVibrate {
    0% { transform: scale(1.08) translate(0px, 0px); }
    25% { transform: scale(1.08) translate(-1.5px, 1.5px); }
    50% { transform: scale(1.08) translate(1.5px, -1.5px); }
    75% { transform: scale(1.08) translate(-1.5px, -1.5px); }
    100% { transform: scale(1.08) translate(1.5px, 1.5px); }
  }

  /* Active Aura States (Triggered on Click/Hold) */
  body.aura-active .zenitsu-bg {
    animation: pressureVibrate 0.08s linear infinite;
    opacity: 0.35;
    transition: opacity 0.05s ease-in;
  }

  body.aura-active .stage {
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    background-color: rgba(255, 215, 70, 0.05);
  }

  .sky {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.4) 50%, transparent 51%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.2) 50%, transparent 51%),
      radial-gradient(2px 2px at 60% 70%, rgba(255,255,255,0.15) 50%, transparent 51%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.3) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 90% 60%, rgba(255,255,255,0.2) 50%, transparent 51%),
      radial-gradient(1px 1px at 45% 40%, rgba(255,255,255,0.25) 50%, transparent 51%);
    opacity: 0.5;
    pointer-events: none;
  }

  .stage {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    pointer-events: none;
    transition: backdrop-filter 0.2s ease-out, -webkit-backdrop-filter 0.2s ease-out, background-color 0.2s ease-out;
  }

  canvas#thunder {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 5;
    pointer-events: none;
    width: 100vw;
    height: 100vh;
    display: block;
    will-change: transform, opacity;
  }
</style>
</head>
<body>

  <div class="zenitsu-bg" id="parallax-bg"></div>
  <div class="sky"></div>
  <div class="stage"></div>
  <canvas id="thunder"></canvas>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('thunder');
  const ctx = canvas.getContext('2d');
  const bgEl = document.getElementById('parallax-bg');

  // --- Setup & Resize ---
  let dpr, width, height;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Utilities ---
  const GOLD_CORE  = '255,254,242'; 
  const GOLD_MID   = '255,206,50';  
  const GOLD_OUTER = '255,132,0';   
  const GOLD_HOT   = '255,255,255';

  const rgba = (rgb, a) => `rgba(${rgb},${Math.max(0, Math.min(1, a))})`;
  const lerp = (a, b, t) => a + (b - a) * t;
  const rand = (min, max) => min + Math.random() * (max - min);
  const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
  const TWO_PI = Math.PI * 2;

  // --- State ---
  const pointer = {
    targetX: width / 2, targetY: height / 2,
    x: width / 2, y: height / 2,
    prevX: width / 2, prevY: height / 2,
    speed: 0, lastMoveAt: 0
  };

  let bgShiftX = 0, bgShiftY = 0;
  const MAX_PARALLAX_SHIFT = 40; 

  function setTarget(x, y) {
    pointer.targetX = x;
    pointer.targetY = y;
    pointer.lastMoveAt = performance.now();
  }

  window.addEventListener('mousemove', e => setTarget(e.clientX, e.clientY));
  window.addEventListener('touchmove', e => {
    if (e.touches.length) setTarget(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  window.addEventListener('mousedown', e => {
    document.body.classList.add('aura-active');
    triggerStrike(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', () => document.body.classList.remove('aura-active'));
  window.addEventListener('mouseleave', () => document.body.classList.remove('aura-active'));

  window.addEventListener('touchstart', e => {
    document.body.classList.add('aura-active');
    if (e.touches.length) {
      setTarget(e.touches[0].clientX, e.touches[0].clientY);
      triggerStrike(pointer.targetX, pointer.targetY);
    }
  }, { passive: true });
  window.addEventListener('touchend', () => document.body.classList.remove('aura-active'));

  // --- Entity Pools ---
  let sparks = [];
  let bolts = [];
  let flashes = [];
  let shockwaves = [];
  const trail = [];

  // --- Particle Generators ---
  function spawnSpark(x, y, speed, life) {
    const angle = rand(0, TWO_PI);
    sparks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      age: 0, life,
      size: rand(1.1, 4),
      drag: rand(0.88, 0.95),
      hot: Math.random() < 0.6
    });
  }

  // Generates jagged, non-recursive realistic lightning path
  function generateLightningPath(x, y, angle, length, maxWander, segmentLength) {
    const points = [{x, y}];
    let cx = x, cy = y, l = 0;
    while (l < length) {
      const a = angle + rand(-maxWander, maxWander);
      const sl = rand(segmentLength * 0.5, segmentLength * 1.5);
      cx += Math.cos(a) * sl;
      cy += Math.sin(a) * sl;
      points.push({x: cx, y: cy});
      l += sl;
    }
    return points;
  }

  function spawnBolt(x, y, angle, length, width, life) {
    const pts = generateLightningPath(x, y, angle, length, 0.8, 15);
    bolts.push({ points: pts, age: 0, life, width, maxAlpha: rand(0.78, 1.15) });
    
    // Spawn sub-branches
    if (Math.random() < 0.5) {
      const branchIdx = Math.floor(rand(1, pts.length - 2));
      const bp = pts[branchIdx];
      const subAngle = angle + (Math.random() < 0.5 ? 1 : -1) * rand(0.5, 1.2);
      const subPts = generateLightningPath(bp.x, bp.y, subAngle, length * rand(0.3, 0.6), 1.0, 12);
      bolts.push({ points: subPts, age: 0, life: life * 0.8, width: width * 0.6, maxAlpha: rand(0.55, 0.95) });
    }
  }

  function triggerStrike(x, y) {
    // Flash
    flashes.push({ x, y, age: 0, life: 400, maxR: rand(300, 500) });
    
    // Shockwave
    shockwaves.push({ x, y, age: 0, life: 500, maxR: rand(150, 250), width: rand(6, 12) });

    // Core outward strikes
    const count = Math.floor(rand(5, 9));
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * TWO_PI + rand(-0.3, 0.3);
      const length = rand(100, 350);
      spawnBolt(x, y, angle, length, rand(2, 5), rand(200, 450));
    }

    // Heavy sparks
    for (let i = 0; i < 40; i++) {
      spawnSpark(x, y, rand(100, 600), rand(300, 800));
    }
  }

  // --- High-Performance Batch Rendering ---
  // Replaces shadowBlur with multi-pass stroked paths for massive FPS gains
  function renderBolts(dt) {
    if (!bolts.length) return;

    ctx.lineJoin = 'miter';
    ctx.lineCap = 'butt';

    // Cleanup and prepare
    const activeBolts = [];
    for (let i = 0; i < bolts.length; i++) {
      const b = bolts[i];
      b.age += dt;
      if (b.age < b.life) activeBolts.push(b);
    }
    bolts = activeBolts;

    // Helper to trace all lines
    const tracePaths = () => {
      ctx.beginPath();
      for (const b of bolts) {
        ctx.moveTo(b.points[0].x, b.points[0].y);
        for (let j = 1; j < b.points.length; j++) {
          ctx.lineTo(b.points[j].x, b.points[j].y);
        }
      }
    };

    // Global Alpha dictates the flicker
    for (const pass of [
      { w: 4.6, col: GOLD_OUTER, mul: 0.34 },
      { w: 2.4, col: GOLD_MID, mul: 0.8 },
      { w: 1.0, col: GOLD_CORE, mul: 1.0 },
      { w: 0.4, col: GOLD_HOT, mul: 0.95 }
    ]) {
      tracePaths();
      for (const b of bolts) {
        const t = b.age / b.life;
        // Sharp erratic flicker curve — brighter baseline, rarer/lighter dimming
        const flicker = Math.random() > 0.06 ? 1 : 0.55; 
        const alpha = Math.pow(1 - t, 1.7) * b.maxAlpha * pass.mul * flicker;
        ctx.strokeStyle = rgba(pass.col, alpha);
        ctx.lineWidth = b.width * pass.w;
        ctx.stroke();
        ctx.beginPath(); // Reset per bolt to allow different alphas
      }
    }
  }

  // --- Main Loop ---
  let lastTime = performance.now();
  let crackleTimer = 0;
  let energyWaveTimer = 0;

  function frame(now) {
    const dt = Math.min(now - lastTime, 32); // Cap dt to avoid massive jumps
    lastTime = now;
    const dtS = dt / 1000;

    // 1. Update Physics / Tracking
    const ease = 0.5;
    pointer.prevX = pointer.x;
    pointer.prevY = pointer.y;
    pointer.x = lerp(pointer.x, pointer.targetX, ease);
    pointer.y = lerp(pointer.y, pointer.targetY, ease);
    pointer.speed = dist(pointer.prevX, pointer.prevY, pointer.x, pointer.y) / Math.max(dtS, 0.001);

    // Parallax
    const normX = (pointer.targetX / width) - 0.5;
    const normY = (pointer.targetY / height) - 0.5;
    bgShiftX = lerp(bgShiftX, normX * -MAX_PARALLAX_SHIFT, 0.1);
    bgShiftY = lerp(bgShiftY, normY * -MAX_PARALLAX_SHIFT, 0.1);
    bgEl.style.transform = `translate(${bgShiftX}px, ${bgShiftY}px) scale(1.08)`;

    // Trail logic
    trail.push({ x: pointer.x, y: pointer.y, t: now });
    while (trail.length && now - trail[0].t > 150) trail.shift();

    const isMoving = (now - pointer.lastMoveAt) < 100 && pointer.speed > 50;

    if (isMoving) {
      const speedFactor = Math.max(0, Math.min(1, pointer.speed / 650));

      // More dynamic electric current sparks, scaled by velocity
      if (Math.random() < 0.55) {
        const sparkCount = 1 + Math.floor(speedFactor * 3);
        for (let k = 0; k < sparkCount; k++) {
          spawnSpark(pointer.x, pointer.y, rand(60, 200) * (1 + speedFactor), rand(220, 450));
        }
      }

      // Trailing lightning connections — more frequent and slightly thicker with speed
      if (trail.length > 5 && Math.random() < 0.55) {
        const past = trail[Math.floor(rand(0, trail.length - 3))];
        const angle = Math.atan2(pointer.y - past.y, pointer.x - past.x);
        const len = dist(pointer.x, pointer.y, past.x, past.y);
        spawnBolt(past.x, past.y, angle, len, rand(1, 3) * (1 + speedFactor * 0.7), rand(120, 280));

        // Subtle branching arcs that react to cursor velocity
        if (speedFactor > 0.2 && Math.random() < 0.35 + speedFactor * 0.45) {
          const branchCount = 1 + Math.floor(speedFactor * 2);
          for (let bI = 0; bI < branchCount; bI++) {
            const bAngle = angle + (Math.random() < 0.5 ? 1 : -1) * rand(0.4, 1.15);
            const bLen = len * rand(0.22, 0.5) * (0.6 + speedFactor);
            spawnBolt(pointer.x, pointer.y, bAngle, bLen, rand(0.7, 1.8) * (1 + speedFactor * 0.4), rand(90, 200));
          }
        }
      }

      // Subtle energy wave pulses on fast, sustained movement
      energyWaveTimer -= dt;
      if (speedFactor > 0.5 && energyWaveTimer <= 0) {
        energyWaveTimer = rand(240, 460);
        shockwaves.push({
          x: pointer.x, y: pointer.y, age: 0, life: 360,
          maxR: rand(36, 64) * (0.6 + speedFactor), width: rand(2, 4)
        });
      }
    } else {
      // Idle ambient static charge
      crackleTimer -= dt;
      if (crackleTimer <= 0) {
        crackleTimer = rand(400, 1200);
        spawnBolt(pointer.x, pointer.y, rand(0, TWO_PI), rand(40, 90), rand(1, 2.5), rand(150, 300));
        spawnSpark(pointer.x, pointer.y, rand(20, 80), rand(200, 500));
      }
    }

    // 2. Render Loop
    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'screen';

    // Flashes
    for (let i = flashes.length - 1; i >= 0; i--) {
      const f = flashes[i];
      f.age += dt;
      const t = f.age / f.life;
      if (t >= 1) { flashes.splice(i, 1); continue; }
      
      const r = lerp(20, f.maxR, Math.pow(t, 0.3));
      const a = Math.pow(1 - t, 2) * 0.25;
      const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
      grad.addColorStop(0, rgba(GOLD_CORE, a));
      grad.addColorStop(0.2, rgba(GOLD_MID, a * 0.6));
      grad.addColorStop(1, rgba(GOLD_OUTER, 0));
      
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(f.x, f.y, r, 0, TWO_PI);
      ctx.fill();
    }

    // Shockwaves (Plasma rings)
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const sw = shockwaves[i];
      sw.age += dt;
      const t = sw.age / sw.life;
      if (t >= 1) { shockwaves.splice(i, 1); continue; }

      const r = lerp(10, sw.maxR, Math.easeOutCubic ? Math.easeOutCubic(t) : Math.pow(t, 0.4));
      const a = Math.pow(1 - t, 1.5);
      
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, r, 0, TWO_PI);
      ctx.strokeStyle = rgba(GOLD_MID, a * 0.8);
      ctx.lineWidth = sw.width * (1 - t);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(sw.x, sw.y, r, 0, TWO_PI);
      ctx.strokeStyle = rgba(GOLD_CORE, a);
      ctx.lineWidth = (sw.width * 0.3) * (1 - t);
      ctx.stroke();
    }

    // Lightning Bolts (Batched)
    renderBolts(dt);

    // Sparks with gravity
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.age += dt;
      if (s.age >= s.life) { sparks.splice(i, 1); continue; }
      
      s.vx *= s.drag;
      s.vy *= s.drag;
      s.vy += 800 * dtS; // Gravity pull
      
      s.x += s.vx * dtS;
      s.y += s.vy * dtS;
      
      const t = s.age / s.life;
      const a = Math.pow(1 - t, 1.25);
      
      ctx.fillStyle = rgba(s.hot ? GOLD_CORE : GOLD_MID, Math.min(1, a * 1.15));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1 - t*0.2), 0, TWO_PI);
      ctx.fill();

      if (s.hot) {
        ctx.fillStyle = rgba(GOLD_HOT, a * 0.85);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * 0.42 * (1 - t * 0.2), 0, TWO_PI);
        ctx.fill();
      }
    }

    // Cursor Core Glow
    const pulse = 1 + 0.18 * Math.sin(now * 0.015);
    const cr = 30 * pulse;

    // Faint outer power ring — extra presence without altering the core style
    const outerR = cr * 1.7;
    const og = ctx.createRadialGradient(pointer.x, pointer.y, cr * 0.6, pointer.x, pointer.y, outerR);
    og.addColorStop(0, rgba(GOLD_OUTER, 0));
    og.addColorStop(0.6, rgba(GOLD_OUTER, 0.10 + 0.05 * Math.sin(now * 0.01)));
    og.addColorStop(1, rgba(GOLD_OUTER, 0));
    ctx.fillStyle = og;
    ctx.beginPath();
    ctx.arc(pointer.x, pointer.y, outerR, 0, TWO_PI);
    ctx.fill();

    const cg = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, cr);
    cg.addColorStop(0, rgba(GOLD_HOT, 1));
    cg.addColorStop(0.22, rgba(GOLD_CORE, 1));
    cg.addColorStop(0.5, rgba(GOLD_MID, 0.62));
    cg.addColorStop(1, rgba(GOLD_OUTER, 0));
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(pointer.x, pointer.y, cr, 0, TWO_PI);
    ctx.fill();

    // Solid core dot
    ctx.fillStyle = GOLD_HOT;
    ctx.beginPath();
    ctx.arc(pointer.x, pointer.y, 2.4 * pulse, 0, TWO_PI);
    ctx.fill();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
