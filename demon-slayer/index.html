<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Demon Slayer Breathing Styles</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
min-height:100vh;
}

header{
text-align:center;
padding:60px 20px;
}

h1{
font-size:4rem;
background:linear-gradient(90deg,#ff6b00,#ffd000);
-webkit-background-clip:text;
color:transparent;
}

.grid{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding-bottom:50px;
}

.card{
background:#181818;
padding:30px;
border-radius:20px;
text-align:center;
transition:.4s;
border:1px solid rgba(255,255,255,.1);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(255,150,0,.6);
}

.card a{
color:white;
text-decoration:none;
font-size:1.1rem;
font-weight:bold;
}
</style>
</head>
<body>

<header>
<h1>⚔ Demon Slayer ⚔</h1>
<p>Choose a Breathing Style</p>
</header>

<div class="grid">

<div class="card"><a href="./Water Breathing Cursor/index.html">🌊 Water Breathing</a></div>

<div class="card"><a href="./Thunder Breathing Cursor/index.html">⚡ Thunder Breathing</a></div>

<div class="card"><a href="./Flame Breathing Cursor/index.html">🔥 Flame Breathing</a></div>

<div class="card"><a href="./Sun Breathing Cursor/index.html">☀️ Sun Breathing</a></div>

<div class="card"><a href="./Moon Breathing Cursor/index.html">🌙 Moon Breathing</a></div>

<div class="card"><a href="./Mist Breathing Cursor/index.html">🌫 Mist Breathing</a></div>

<div class="card"><a href="./Love Breathing Cursor/index.html">💗 Love Breathing</a></div>

<div class="card"><a href="./Serpent Breathing Cursor/index.html">🐍 Serpent Breathing</a></div>

<div class="card"><a href="./Beast Beathing Cursor/index.html">🦁 Beast Breathing</a></div>

</div>

</body>
</html>
