<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beast Breathing Cursor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(
          ellipse at 50% 38%,
          #0a0d18 0%,
          #05070f 42%,
          #000 100%
        );
      }
      .inosuke-bg {
        position: fixed;
        top: -5%;
        left: -5%;
        width: 110%;
        height: 110%;
        z-index: 1;
        background-image: url("bg.png");
        background-size: cover;
        background-position: center;
        opacity: 9.8;
        pointer-events: none;
        will-change: transform;
        transition: opacity 0.3s;
      }
      body.aura-active .inosuke-bg {
        opacity: 0.22;
      }
      #c {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      #hd {
        position: fixed;
        inset: 0;
        z-index: 9;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="inosuke-bg" id="tbg"></div>
    <canvas id="hd"></canvas>
    <canvas id="c"></canvas>

    <script>
      (function () {
        "use strict";

        /* ── Canvas & DPR ── */
        const C = document.getElementById("c");
        const ctx = C.getContext("2d");
        const HD = document.getElementById("hd");
        const hctx = HD.getContext("2d");
        const tbg = document.getElementById("tbg");
        let W, H, dpr;

        function resize() {
          dpr = Math.min(devicePixelRatio || 1, 2);
          W = innerWidth;
          H = innerHeight;
          C.width = W * dpr;
          C.height = H * dpr;
          C.style.width = W + "px";
          C.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          HD.width = W * dpr;
          HD.height = H * dpr;
          HD.style.width = W + "px";
          HD.style.height = H + "px";
          hctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        addEventListener("resize", resize);
        resize();

        /* ── Math helpers ── */
        const lerp = (a, b, t) => a + (b - a) * t;
        const rand = (a, b) => a + Math.random() * (b - a);
        const randi = (a, b) => (a + Math.random() * (b - a)) | 0;
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const TAU = Math.PI * 2;

        /* ══════════════════════════════════════════════════
         BEAST BREATHING COLOR SYSTEM
         Void black → gunmetal → steel blue → frost gray → cold white
      ══════════════════════════════════════════════════ */
        const LUT_R = new Uint8Array(256);
        const LUT_G = new Uint8Array(256);
        const LUT_B = new Uint8Array(256);
        (function () {
          const stops = [
            [0, [0, 0, 0]],
            [22, [5, 8, 14]],
            [55, [18, 28, 48]],
            [95, [35, 65, 105]],
            [135, [70, 115, 165]],
            [175, [110, 155, 200]],
            [215, [165, 200, 230]],
            [245, [210, 230, 248]],
            [255, [235, 245, 255]],
          ];
          for (let i = 0; i < 256; i++)
            for (let s = 0; s < stops.length - 1; s++) {
              const [t0, c0] = stops[s],
                [t1, c1] = stops[s + 1];
              if (i >= t0 && i <= t1) {
                const f = (i - t0) / (t1 - t0);
                LUT_R[i] = (c0[0] + (c1[0] - c0[0]) * f) | 0;
                LUT_G[i] = (c0[1] + (c1[1] - c0[1]) * f) | 0;
                LUT_B[i] = (c0[2] + (c1[2] - c0[2]) * f) | 0;
                break;
              }
            }
        })();

        /* Savage smoke / ash accent LUT */
        const SLUT_R = new Uint8Array(256);
        const SLUT_G = new Uint8Array(256);
        const SLUT_B = new Uint8Array(256);
        (function () {
          const stops = [
            [0, [0, 0, 0]],
            [35, [12, 12, 14]],
            [80, [42, 44, 50]],
            [130, [88, 94, 108]],
            [185, [145, 152, 168]],
            [225, [195, 202, 215]],
            [255, [230, 235, 242]],
          ];
          for (let i = 0; i < 256; i++)
            for (let s = 0; s < stops.length - 1; s++) {
              const [t0, c0] = stops[s],
                [t1, c1] = stops[s + 1];
              if (i >= t0 && i <= t1) {
                const f = (i - t0) / (t1 - t0);
                SLUT_R[i] = (c0[0] + (c1[0] - c0[0]) * f) | 0;
                SLUT_G[i] = (c0[1] + (c1[1] - c0[1]) * f) | 0;
                SLUT_B[i] = (c0[2] + (c1[2] - c0[2]) * f) | 0;
                break;
              }
            }
        })();

        function beastColor(t, a) {
          const i = clamp(t * 255, 0, 255) | 0;
          return `rgba(${LUT_R[i]},${LUT_G[i]},${LUT_B[i]},${a})`;
        }
        function smokeColor(t, a) {
          const i = clamp(t * 255, 0, 255) | 0;
          return `rgba(${SLUT_R[i]},${SLUT_G[i]},${SLUT_B[i]},${a})`;
        }

        /* ── Pointer state ── */
        const P = {
          x: W / 2,
          y: H / 2,
          tx: W / 2,
          ty: H / 2,
          px: W / 2,
          py: H / 2,
          vx: 0,
          vy: 0,
          speed: 0,
          lastMove: 0,
        };
        function setTarget(x, y) {
          P.tx = x;
          P.ty = y;
          P.lastMove = performance.now();
        }
        addEventListener("mousemove", (e) => setTarget(e.clientX, e.clientY));
        addEventListener(
          "touchmove",
          (e) => {
            if (e.touches.length)
              setTarget(e.touches[0].clientX, e.touches[0].clientY);
          },
          { passive: true },
        );

        addEventListener("mousedown", (e) => {
          document.body.classList.add("aura-active");
          burst(e.clientX, e.clientY);
        });
        addEventListener("mouseup", () =>
          document.body.classList.remove("aura-active"),
        );
        addEventListener("mouseleave", () =>
          document.body.classList.remove("aura-active"),
        );
        addEventListener(
          "touchstart",
          (e) => {
            document.body.classList.add("aura-active");
            if (e.touches.length) {
              setTarget(e.touches[0].clientX, e.touches[0].clientY);
              burst(P.tx, P.ty);
            }
          },
          { passive: true },
        );
        addEventListener("touchend", () =>
          document.body.classList.remove("aura-active"),
        );

        /* ══════════════════════════════════════════
         BEAST CORE — orbiting feral energy nodes
      ══════════════════════════════════════════ */
        const ORBIT_NODES = 6;
        const orbitNodes = [];
        for (let i = 0; i < ORBIT_NODES; i++) {
          orbitNodes.push({
            angle: (i / ORBIT_NODES) * TAU,
            r: rand(14, 22),
            speed: rand(1.8, 3.4) * (Math.random() < 0.5 ? 1 : -1),
            size: rand(2.2, 4.5),
            phase: rand(0, TAU),
          });
        }

        /* ══════════════════════════════════════════
         PARTICLE POOLS
      ══════════════════════════════════════════ */

        /* — Debris / rock shards — */
        const DBMAX = 360;
        const debris = new Array(DBMAX);
        for (let i = 0; i < DBMAX; i++) debris[i] = { alive: false };
        let dbHead = 0;
        function spawnDebris(x, y, vx, vy, life, sz, hot) {
          const e = debris[dbHead % DBMAX];
          dbHead++;
          e.alive = true;
          e.x = x;
          e.y = y;
          e.vx = vx;
          e.vy = vy;
          e.age = 0;
          e.life = life;
          e.sz = sz;
          e.hot = hot;
          e.rot = rand(0, TAU);
          e.rotSpd = rand(-6, 6);
          e.grav = rand(80, 200);
          e.phase = rand(0, TAU);
          e.sway = rand(0, 0.5);
        }

        /* — Energy streaks — */
        const STMAX = 480;
        const streaks = new Array(STMAX);
        for (let i = 0; i < STMAX; i++)
          streaks[i] = { alive: false, px: 0, py: 0 };
        let stHead = 0;
        function spawnStreak(x, y, vx, vy, life, bright) {
          const s = streaks[stHead % STMAX];
          stHead++;
          s.alive = true;
          s.x = x;
          s.y = y;
          s.px = x;
          s.py = y;
          s.vx = vx;
          s.vy = vy;
          s.age = 0;
          s.life = life;
          s.bright = bright;
        }

        /* — Beast energy puffs — */
        const FMAX = 320;
        const puffs = new Array(FMAX);
        for (let i = 0; i < FMAX; i++) puffs[i] = { alive: false };
        let fHead = 0;
        function spawnPuff(x, y, vx, vy, r, life, hot) {
          const f = puffs[fHead % FMAX];
          fHead++;
          f.alive = true;
          f.x = x;
          f.y = y;
          f.vx = vx;
          f.vy = vy;
          f.age = 0;
          f.life = life;
          f.r = r;
          f.hot = hot;
        }

        /* — Dust wisps — */
        const DMAX = 220;
        const dustWisps = new Array(DMAX);
        for (let i = 0; i < DMAX; i++) dustWisps[i] = { alive: false };
        let dwHead = 0;
        function spawnDust(x, y, vx, vy, r, life) {
          const s = dustWisps[dwHead % DMAX];
          dwHead++;
          s.alive = true;
          s.x = x;
          s.y = y;
          s.vx = vx;
          s.vy = vy;
          s.age = 0;
          s.life = life;
          s.r = r;
          s.wave = rand(0, TAU);
          s.waveSpd = rand(1.5, 4);
        }

        /* — Scratch marks (persistent claw trails left on screen) — */
        const SCMAX = 16;
        const scratches = new Array(SCMAX);
        for (let i = 0; i < SCMAX; i++) scratches[i] = { alive: false };
        let scHead = 0;
        function spawnScratch(x, y, angle, len, life, clawCount) {
          const s = scratches[scHead % SCMAX];
          scHead++;
          s.alive = true;
          s.x = x;
          s.y = y;
          s.angle = angle;
          s.len = len;
          s.age = 0;
          s.life = life;
          s.clawCount = clawCount;
          /* generate claw lines */
          s.claws = [];
          const spread = 0.18;
          for (let c = 0; c < clawCount; c++) {
            const off = (c - (clawCount - 1) / 2) * spread;
            const a = angle + off;
            /* each claw has slight curve via control point */
            const cx1 = x + Math.cos(a - 0.12) * len * 0.42;
            const cy1 = y + Math.sin(a - 0.12) * len * 0.42;
            const ex = x + Math.cos(a) * len;
            const ey = y + Math.sin(a) * len;
            s.claws.push({ cx1, cy1, ex, ey, w: rand(1.8, 3.2) });
          }
        }

        /* — Claw slash burst shapes — */
        const CLAW_BURST_MAX = 24;
        const clawBursts = new Array(CLAW_BURST_MAX);
        for (let i = 0; i < CLAW_BURST_MAX; i++)
          clawBursts[i] = { alive: false };
        let cbHead = 0;
        function spawnClawBurst(x, y, angle, speed, len, life, hot) {
          const c = clawBursts[cbHead % CLAW_BURST_MAX];
          cbHead++;
          c.alive = true;
          c.x = x;
          c.y = y;
          c.vx = Math.cos(angle) * speed;
          c.vy = Math.sin(angle) * speed;
          c.angle = angle;
          c.len = len;
          c.age = 0;
          c.life = life;
          c.hot = hot;
          c.spin = rand(-1.2, 1.2);
        }

        /* — Shockwaves & flashes — */
        const waves = [];
        const flashes = [];

        /* — Ambient glow cells — */
        const HDMAX = 160;
        const hdCells = new Array(HDMAX);
        for (let i = 0; i < HDMAX; i++) hdCells[i] = { alive: false };
        let hdHead = 0;
        function spawnHD(x, y, str, life) {
          const h = hdCells[hdHead % HDMAX];
          hdHead++;
          h.alive = true;
          h.x = x;
          h.y = y;
          h.str = str;
          h.age = 0;
          h.life = life;
        }

        /* — Trail — */
        const TMAX = 72;
        const trail = [];
        function addTrail(x, y, t) {
          if (trail.length >= TMAX) trail.shift();
          trail.push({ x, y, t });
        }

        /* ══════════════════════════════════════════
         DRAW HELPERS
      ══════════════════════════════════════════ */

        /* Draw a single realistic animal claw shape */
        function drawClaw(ox, oy, angle, len, width, alpha, colorFn, hot) {
          ctx.save();
          ctx.translate(ox, oy);
          ctx.rotate(angle);

          /* main curved claw body */
          ctx.beginPath();
          ctx.moveTo(0, 0);
          /* bezier curves inward to create hook */
          ctx.bezierCurveTo(
            width * 1.1,
            -len * 0.18,
            width * 0.8,
            -len * 0.65,
            0,
            -len,
          );
          ctx.bezierCurveTo(
            -width * 0.35,
            -len * 0.65,
            -width * 0.55,
            -len * 0.22,
            0,
            0,
          );
          ctx.closePath();

          const g = ctx.createLinearGradient(0, 0, 0, -len);
          g.addColorStop(0, colorFn(hot, alpha * 0.95));
          g.addColorStop(0.4, colorFn(hot * 0.82, alpha * 0.88));
          g.addColorStop(0.78, colorFn(hot * 0.55, alpha * 0.62));
          g.addColorStop(1, colorFn(hot * 0.22, 0));
          ctx.fillStyle = g;
          ctx.fill();

          /* sharp highlight ridge */
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.bezierCurveTo(
            width * 0.2,
            -len * 0.2,
            width * 0.1,
            -len * 0.7,
            0,
            -len,
          );
          ctx.lineWidth = Math.max(0.4, width * 0.18);
          ctx.strokeStyle = `rgba(220,230,248,${alpha * 0.7})`;
          ctx.stroke();

          ctx.restore();
        }

        /* Draw claw burst: 3–4 slashing claws radiating from a point */
        function drawClawBurst(cb) {
          const tp = cb.age / cb.life;
          const a = Math.sin(tp * Math.PI) * 0.92 * cb.hot;
          if (a < 0.02) return;
          const hot = cb.hot * (1 - tp * 0.6);
          const baseLen = cb.len * (1 + tp * 0.22);
          const CLAWS = 4;
          const spread = 0.16;
          for (let c = 0; c < CLAWS; c++) {
            const off = (c - (CLAWS - 1) / 2) * spread;
            drawClaw(
              cb.x,
              cb.y,
              cb.angle + off,
              baseLen,
              baseLen * 0.22,
              a,
              beastColor,
              hot,
            );
          }
        }

        /* Draw scratch marks on canvas */
        function drawScratch(sc) {
          const tp = sc.age / sc.life;
          const alpha = clamp((1 - tp) * (1 - Math.pow(tp, 0.4)), 0, 1) * 0.88;
          if (alpha < 0.01) return;
          ctx.save();
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          for (const cl of sc.claws) {
            /* outer glow */
            ctx.beginPath();
            ctx.moveTo(sc.x, sc.y);
            ctx.quadraticCurveTo(cl.cx1, cl.cy1, cl.ex, cl.ey);
            ctx.lineWidth = cl.w * 4;
            ctx.strokeStyle = `rgba(90,130,190,${alpha * 0.22})`;
            ctx.stroke();
            /* main scratch line */
            ctx.beginPath();
            ctx.moveTo(sc.x, sc.y);
            ctx.quadraticCurveTo(cl.cx1, cl.cy1, cl.ex, cl.ey);
            ctx.lineWidth = cl.w * 1.4;
            ctx.strokeStyle = `rgba(190,210,240,${alpha * 0.82})`;
            ctx.stroke();
            /* bright core */
            ctx.beginPath();
            ctx.moveTo(sc.x, sc.y);
            ctx.quadraticCurveTo(cl.cx1, cl.cy1, cl.ex, cl.ey);
            ctx.lineWidth = cl.w * 0.5;
            ctx.strokeStyle = `rgba(240,248,255,${alpha * 0.95})`;
            ctx.stroke();
          }
          ctx.restore();
        }

        /* ══════════════════════════════════════════
         BURST — Beast Breathing: 6th Slice: Palisade Bite
      ══════════════════════════════════════════ */
        function burst(x, y) {
          waves.push({ x, y, r: 0, maxR: rand(220, 360), age: 0, life: 680 });
          waves.push({
            x,
            y,
            r: 0,
            maxR: rand(130, 200),
            age: 0,
            life: 500,
            delay: 90,
          });
          flashes.push({ x, y, r: 0, maxR: rand(290, 430), age: 0, life: 520 });

          /* Huge claw burst slashes — the signature element */
          const SLICES = 8;
          for (let i = 0; i < SLICES; i++) {
            const a = (i / SLICES) * TAU + rand(-0.18, 0.18);
            const spd = rand(90, 260);
            spawnClawBurst(
              x,
              y,
              a,
              spd,
              rand(38, 72),
              rand(480, 860),
              rand(0.75, 1.0),
            );
            spawnPuff(
              x,
              y,
              Math.cos(a) * spd * 0.55,
              Math.sin(a) * spd * 0.55,
              rand(22, 52),
              rand(320, 640),
              rand(0.6, 1.0),
            );
          }

          /* Persistent scratch marks left on ground — multiple angles */
          const SCRATCH_COUNT = 5;
          for (let i = 0; i < SCRATCH_COUNT; i++) {
            const sa = rand(0, TAU);
            const len = rand(100, 260);
            spawnScratch(x, y, sa, len, rand(1200, 2400), randi(3, 5));
          }

          /* Debris burst */
          for (let i = 0; i < 80; i++) {
            const a = rand(0, TAU),
              spd = rand(60, 380);
            spawnDebris(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd,
              rand(450, 1100),
              rand(1.8, 4.5),
              rand(0.5, 1.0),
            );
          }

          /* Energy streaks */
          for (let i = 0; i < 140; i++) {
            const a = rand(0, TAU),
              spd = rand(80, 500);
            spawnStreak(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd,
              rand(260, 900),
              rand(0.7, 1.0),
            );
          }

          /* Dust clouds */
          for (let i = 0; i < 14; i++) {
            const a = rand(0, TAU),
              spd = rand(18, 80);
            spawnDust(
              x + rand(-15, 15),
              y + rand(-15, 15),
              Math.cos(a) * spd,
              Math.sin(a) * spd,
              rand(28, 65),
              rand(700, 1400),
            );
          }

          spawnHD(x, y, rand(10, 16), rand(650, 1100));
        }

        /* ══════════════════════════════════════════
         MAIN LOOP
      ══════════════════════════════════════════ */
        let last = performance.now();
        let ambD = 0,
          ambF = 0,
          ambSt = 0,
          ambHD = 0,
          ambDust = 0;

        function frame(now) {
          requestAnimationFrame(frame);
          const dt = Math.min(now - last, 33);
          last = now;
          const dtS = dt * 0.001;

          /* Pointer tracking */
          P.px = P.x;
          P.py = P.y;
          const ease = 1 - Math.pow(0.004, dtS * 5);
          P.x = lerp(P.x, P.tx, ease);
          P.y = lerp(P.y, P.ty, ease);
          P.vx = (P.x - P.px) / Math.max(dtS, 0.001);
          P.vy = (P.y - P.py) / Math.max(dtS, 0.001);
          P.speed = Math.hypot(P.vx, P.vy);

          /* Parallax */
          const bx = (P.tx / W - 0.5) * -28;
          const by = (P.ty / H - 0.5) * -28;
          tbg.style.transform = `translate(${bx | 0}px,${by | 0}px) scale(1.08)`;

          addTrail(P.x, P.y, now);
          while (trail.length && now - trail[0].t > 340) trail.shift();

          const idle = now - P.lastMove;
          const moving = idle < 140;
          const speedFactor = clamp(P.speed / 320, 0, 1);

          /* Update orbit nodes */
          for (const n of orbitNodes) {
            n.angle += n.speed * dtS;
          }

          /* ── Ambient debris motes ── */
          ambD -= dt;
          if (ambD <= 0) {
            ambD = moving ? rand(14, 34) : rand(38, 75);
            const n = moving ? randi(2, 5) : 1;
            for (let i = 0; i < n; i++) {
              const a = -Math.PI * 0.5 + rand(-1.2, 1.2);
              const spd = rand(12, 65) * (1 + speedFactor * 2.0);
              spawnDebris(
                P.x + rand(-6, 6),
                P.y + rand(-6, 6),
                Math.cos(a) * spd,
                Math.sin(a) * spd - rand(10, 40),
                rand(550, 1400),
                rand(0.8, 2.2),
                rand(0.35, 0.88),
              );
            }
          }

          /* ── Ambient energy puffs ── */
          ambF -= dt;
          if (ambF <= 0) {
            ambF = moving ? rand(12, 28) : rand(34, 70);
            const n = moving ? randi(2, 5) : randi(1, 2);
            for (let i = 0; i < n; i++) {
              const a = -Math.PI * 0.5 + rand(-1.3, 1.3);
              const spd = rand(10, 62) * (1 + speedFactor * 1.5);
              spawnPuff(
                P.x + rand(-7, 7),
                P.y + rand(-7, 7),
                Math.cos(a) * spd * 0.42,
                Math.sin(a) * spd - rand(6, 32),
                rand(9, 28) * (1 + speedFactor * 0.8),
                rand(140, 360),
                rand(0.35, 1.0),
              );
            }
          }

          /* ── Ambient streaks ── */
          ambSt -= dt;
          if (ambSt <= 0) {
            ambSt = moving ? rand(18, 45) : rand(55, 120);
            if (Math.random() < (moving ? 0.72 : 0.28)) {
              const a = rand(0, TAU);
              const spd = rand(22, 120) * (1 + speedFactor * 1.4);
              spawnStreak(
                P.x + rand(-8, 8),
                P.y + rand(-8, 8),
                Math.cos(a) * spd,
                Math.sin(a) * spd,
                rand(200, 560),
                rand(0.45, 0.9),
              );
            }
          }

          /* ── Ambient dust ── */
          ambDust -= dt;
          if (ambDust <= 0) {
            ambDust = moving ? rand(65, 140) : rand(180, 360);
            if (Math.random() < (moving ? 0.55 : 0.15)) {
              spawnDust(
                P.x + rand(-12, 12),
                P.y + rand(-12, 12),
                rand(-14, 14),
                rand(-20, -5),
                rand(12, 28),
                rand(400, 820),
              );
            }
          }

          ambHD -= dt;
          if (ambHD <= 0) {
            ambHD = rand(80, 160);
            spawnHD(
              P.x + rand(-14, 14),
              P.y + rand(-14, 14),
              rand(2.5, 5.5),
              rand(180, 380),
            );
          }

          /* ── Movement-triggered emission ── */
          if (moving && P.speed > 22) {
            const n = clamp((P.speed / 110) | 0, 1, 7);
            for (let i = 0; i < n; i++) {
              const t = Math.random();
              const sx = lerp(P.px, P.x, t),
                sy = lerp(P.py, P.y, t);
              const a = -Math.PI * 0.5 + rand(-1.3, 1.3);
              const spd = rand(24, 95) + speedFactor * 65;
              spawnPuff(
                sx + rand(-4, 4),
                sy + rand(-4, 4),
                P.vx * 0.09 + Math.cos(a) * spd * 0.4,
                -Math.abs(Math.sin(a) * spd) - rand(14, 44),
                rand(7, 20),
                rand(120, 300),
                rand(0.55, 1.0),
              );
              if (Math.random() < 0.48)
                spawnDebris(
                  sx,
                  sy,
                  P.vx * 0.06 + rand(-32, 32),
                  -rand(28, 105),
                  rand(400, 960),
                  rand(0.8, 2.0),
                  rand(0.45, 0.92),
                );
              if (P.speed > 115 && Math.random() < 0.35)
                spawnStreak(
                  sx,
                  sy,
                  P.vx * 0.14 + rand(-68, 68),
                  P.vy * 0.14 + rand(-68, 68),
                  rand(150, 420),
                  0.85,
                );
            }
            /* Spawn small ambient scratch arc on very fast movement */
            if (P.speed > 240 && Math.random() < 0.04) {
              const sa = Math.atan2(P.vy, P.vx) + rand(-0.4, 0.4);
              spawnScratch(
                P.x,
                P.y,
                sa,
                rand(50, 110),
                rand(350, 640),
                randi(2, 3),
              );
            }
          }

          /* ═══════════ DRAW ═══════════ */
          ctx.clearRect(0, 0, W, H);
          ctx.globalCompositeOperation = "lighter";

          /* ── Flashes — steel-blue burst bloom ── */
          for (let i = flashes.length - 1; i >= 0; i--) {
            const f = flashes[i];
            f.age += dt;
            if (f.age >= f.life) {
              flashes.splice(i, 1);
              continue;
            }
            const tp = f.age / f.life;
            const r = lerp(0, f.maxR, Math.pow(tp, 0.26));
            const a = (1 - tp) * (1 - tp) * 0.3;
            const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
            g.addColorStop(0, `rgba(230,240,255,${a})`);
            g.addColorStop(0.22, `rgba(120,170,230,${a * 0.82})`);
            g.addColorStop(0.55, `rgba(45,85,150,${a * 0.5})`);
            g.addColorStop(0.82, `rgba(10,22,55,${a * 0.25})`);
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(f.x, f.y, r, 0, TAU);
            ctx.fill();
          }

          /* ── Shockwaves — savage impact rings ── */
          for (let i = waves.length - 1; i >= 0; i--) {
            const w = waves[i];
            if (w.delay && w.delay > 0) {
              w.delay -= dt;
              continue;
            }
            w.age += dt;
            if (w.age >= w.life) {
              waves.splice(i, 1);
              continue;
            }
            const tp = w.age / w.life;
            const r = lerp(0, w.maxR, Math.pow(tp, 0.46));
            const a = (1 - tp) * (1 - tp) * 0.75;
            const lw = lerp(6, 0.4, tp);
            ctx.beginPath();
            ctx.arc(w.x, w.y, r, 0, TAU);
            ctx.lineWidth = lw;
            ctx.strokeStyle = `rgba(140,185,235,${a})`;
            ctx.stroke();
            ctx.lineWidth = lw * 3.5;
            ctx.strokeStyle = `rgba(50,90,160,${a * 0.32})`;
            ctx.stroke();
            if (tp < 0.48) {
              const ta = a * (1 - tp / 0.48);
              ctx.lineWidth = lw * 0.55;
              ctx.strokeStyle = `rgba(220,235,255,${ta * 0.82})`;
              ctx.stroke();
            }
          }

          /* ── Dust wisps (source-over) ── */
          ctx.globalCompositeOperation = "source-over";
          for (let i = 0; i < DMAX; i++) {
            const s = dustWisps[i];
            if (!s.alive) continue;
            s.age += dt;
            if (s.age >= s.life) {
              s.alive = false;
              continue;
            }
            s.wave += s.waveSpd * dtS;
            s.x += (s.vx + Math.sin(s.wave) * 12) * dtS;
            s.y += s.vy * dtS;
            s.vy -= dtS * 3.5;
            s.vx *= Math.pow(0.985, dtS * 60);
            const tp = s.age / s.life;
            const r = s.r * (1 + tp * 1.1);
            const a = (1 - tp) * 0.11 * Math.sin(tp * Math.PI);
            const g = ctx.createRadialGradient(
              s.x,
              s.y,
              0,
              s.x,
              s.y,
              Math.max(1, r),
            );
            g.addColorStop(0, `rgba(100,120,155,${a})`);
            g.addColorStop(0.5, `rgba(55,70,95,${a * 0.5})`);
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(s.x, s.y, Math.max(1, r), 0, TAU);
            ctx.fill();
          }

          /* ── Persistent scratch marks ── */
          ctx.globalCompositeOperation = "lighter";
          for (let i = 0; i < SCMAX; i++) {
            const sc = scratches[i];
            if (!sc.alive) continue;
            sc.age += dt;
            if (sc.age >= sc.life) {
              sc.alive = false;
              continue;
            }
            drawScratch(sc);
          }

          /* ── Energy puffs ── */
          ctx.globalCompositeOperation = "lighter";
          for (let i = 0; i < FMAX; i++) {
            const f = puffs[i];
            if (!f.alive) continue;
            f.age += dt;
            if (f.age >= f.life) {
              f.alive = false;
              continue;
            }
            f.x += f.vx * dtS;
            f.y += f.vy * dtS;
            f.vy -= dtS * 38;
            f.vx *= Math.pow(0.962, dtS * 60);
            f.vx += Math.sin(now * 0.007 + f.age * 0.011) * dtS * 22;
            const tp = f.age / f.life;
            const hotness = f.hot * (1 - tp);
            const r = f.r * (1 + tp * 0.3);
            const a = Math.sin(tp * Math.PI) * 0.65 * f.hot;
            const g = ctx.createRadialGradient(
              f.x,
              f.y,
              0,
              f.x,
              f.y,
              Math.max(1, r),
            );
            g.addColorStop(0, beastColor(hotness, a));
            g.addColorStop(0.45, beastColor(hotness * 0.6, a * 0.62));
            g.addColorStop(0.82, beastColor(hotness * 0.28, a * 0.26));
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(f.x, f.y, Math.max(1, r), 0, TAU);
            ctx.fill();
          }

          /* ── Claw burst shapes ── */
          for (let i = 0; i < CLAW_BURST_MAX; i++) {
            const cb = clawBursts[i];
            if (!cb.alive) continue;
            cb.age += dt;
            if (cb.age >= cb.life) {
              cb.alive = false;
              continue;
            }
            cb.x += cb.vx * dtS;
            cb.y += cb.vy * dtS;
            cb.vy -= dtS * 22;
            cb.vx *= Math.pow(0.972, dtS * 60);
            cb.angle += cb.spin * dtS;
            drawClawBurst(cb);
          }

          /* ── Trail — savage beast motion ribbon ── */
          if (trail.length >= 3) {
            for (let i = 1; i < trail.length; i++) {
              const age = (now - trail[i].t) / 340;
              const alpha = clamp(1 - age, 0, 1);
              if (alpha < 0.01) continue;
              const w = lerp(1.2, 9.5, 1 - age);
              ctx.beginPath();
              ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
              ctx.lineTo(trail[i].x, trail[i].y);
              /* deep outer */
              ctx.lineWidth = w * 5.2;
              ctx.strokeStyle = `rgba(10,18,40,${alpha * 0.14})`;
              ctx.stroke();
              /* steel blue mid */
              ctx.lineWidth = w * 3.1;
              ctx.strokeStyle = `rgba(55,100,175,${alpha * 0.28})`;
              ctx.stroke();
              /* frost accent */
              ctx.lineWidth = w * 1.8;
              ctx.strokeStyle = `rgba(130,175,225,${alpha * 0.32})`;
              ctx.stroke();
              /* cold white core */
              ctx.lineWidth = w * 1.1;
              ctx.strokeStyle = `rgba(200,220,248,${alpha * 0.62})`;
              ctx.stroke();
              /* bright spine */
              ctx.lineWidth = Math.max(0.7, w * 0.42);
              ctx.strokeStyle = `rgba(240,248,255,${alpha * 0.95})`;
              ctx.stroke();
            }
          }

          /* ── Energy streaks ── */
          for (let i = 0; i < STMAX; i++) {
            const s = streaks[i];
            if (!s.alive) continue;
            s.age += dt;
            if (s.age >= s.life) {
              s.alive = false;
              continue;
            }
            s.px = s.x;
            s.py = s.y;
            s.x += s.vx * dtS;
            s.y += s.vy * dtS;
            s.vy += 130 * dtS;
            s.vx *= Math.pow(0.892, dtS * 60);
            const tp = s.age / s.life;
            const a = clamp((1 - tp) * (1 - tp) * s.bright * 1.2, 0, 1);
            const hotness = 1 - tp * 0.5;
            const tlen = Math.hypot(s.x - s.px, s.y - s.py);
            const slen = clamp(tlen, 2, 22);
            const ang = Math.atan2(s.y - s.py, s.x - s.px);
            ctx.setTransform(dpr, 0, 0, dpr, s.x, s.y);
            ctx.rotate(ang + Math.PI);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(slen, 0);
            const gc = ctx.createLinearGradient(0, 0, slen, 0);
            gc.addColorStop(0, beastColor(hotness, a));
            gc.addColorStop(1, beastColor(hotness * 0.32, 0));
            ctx.strokeStyle = gc;
            ctx.lineWidth = clamp(2.2 - tp * 1.6, 0.4, 2.2);
            ctx.stroke();
            ctx.strokeStyle = beastColor(hotness, a * 0.22);
            ctx.lineWidth = clamp(2.2 - tp * 1.6, 0.4, 2.2) * 2.4;
            ctx.stroke();
          }
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          /* ── Debris shards ── */
          for (let i = 0; i < DBMAX; i++) {
            const e = debris[i];
            if (!e.alive) continue;
            e.age += dt;
            if (e.age >= e.life) {
              e.alive = false;
              continue;
            }
            e.x += e.vx * dtS + Math.sin(now * 0.0028 + e.phase) * e.sway * dtS;
            e.y += e.vy * dtS;
            e.vy += e.grav * dtS;
            e.vx *= Math.pow(0.974, dtS * 60);
            e.rot += e.rotSpd * dtS;
            const tp = e.age / e.life;
            const hotness = e.hot * (1 - tp * 0.6);
            const a = (1 - tp) * (1 - tp) * 0.9;
            const r = e.sz * (1 - tp * 0.3);
            if (r < 0.35 || a < 0.01) continue;
            /* angular debris shard */
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.rot);
            ctx.scale(1, 0.48);
            ctx.beginPath();
            ctx.arc(0, 0, Math.max(0.35, r), 0, TAU);
            ctx.fillStyle = smokeColor(hotness, a);
            ctx.fill();
            ctx.scale(1, 1 / 0.48);
            ctx.scale(2.3, 2.3);
            ctx.beginPath();
            ctx.arc(0, 0, Math.max(0.35, r), 0, TAU);
            ctx.fillStyle = smokeColor(hotness, a * 0.18);
            ctx.fill();
            ctx.restore();
          }

          /* ── BEAST ENERGY CORE — the visible cursor ── */
          {
            const breathe =
              0.86 +
              0.1 * Math.sin(now * 0.0088) +
              0.062 * Math.sin(now * 0.022 + 1.1) +
              0.038 * Math.sin(now * 0.041 + 2.5);

            /* Wild instability jitter — more aggressive than other breathing styles */
            const turbFreq = 0.022;
            const jx =
              Math.sin(now * turbFreq) * 1.8 +
              Math.sin(now * 0.037 + 1.3) * 0.9;
            const jy =
              Math.cos(now * turbFreq * 0.88) * 1.8 +
              Math.cos(now * 0.031 + 2.1) * 0.9;
            const cx = P.x + jx,
              cy = P.y + jy;

            ctx.globalCompositeOperation = "lighter";

            /* Far outer beast aura */
            const vg = ctx.createRadialGradient(
              cx,
              cy,
              0,
              cx,
              cy,
              82 * breathe,
            );
            vg.addColorStop(0, `rgba(55,100,175,0.18)`);
            vg.addColorStop(0.45, `rgba(22,48,105,0.08)`);
            vg.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = vg;
            ctx.beginPath();
            ctx.arc(cx, cy, 82 * breathe, 0, TAU);
            ctx.fill();

            /* Turbulent energy ring — rotates erratically */
            const ringAngle = now * 0.0034;
            const ringAngle2 = now * -0.0051 + 1.2;
            for (let k = 0; k < 8; k++) {
              const ra = ringAngle + (k / 8) * TAU;
              const ra2 = ringAngle2 + (k / 8) * TAU;
              const ripR =
                (24 + k * 3.2 + Math.sin(now * 0.009 + k) * 3.5) * breathe;
              const rx1 = cx + Math.cos(ra) * ripR;
              const ry1 = cy + Math.sin(ra) * ripR;
              const rx2 = cx + Math.cos(ra2) * (ripR * 0.72);
              const ry2 = cy + Math.sin(ra2) * (ripR * 0.72);
              const rAlp = (0.24 - k * 0.018) * breathe;
              if (rAlp > 0.01) {
                const rg1 = ctx.createRadialGradient(
                  rx1,
                  ry1,
                  0,
                  rx1,
                  ry1,
                  5 * breathe,
                );
                rg1.addColorStop(0, `rgba(180,210,248,${rAlp * 1.2})`);
                rg1.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = rg1;
                ctx.beginPath();
                ctx.arc(rx1, ry1, 5 * breathe, 0, TAU);
                ctx.fill();
                const rg2 = ctx.createRadialGradient(
                  rx2,
                  ry2,
                  0,
                  rx2,
                  ry2,
                  3.5 * breathe,
                );
                rg2.addColorStop(0, `rgba(140,185,235,${rAlp * 0.8})`);
                rg2.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = rg2;
                ctx.beginPath();
                ctx.arc(rx2, ry2, 3.5 * breathe, 0, TAU);
                ctx.fill();
              }
            }

            /* Beast energy lines shooting outward (wild instability) */
            ctx.lineCap = "round";
            const linePhase = now * 0.0025;
            for (let k = 0; k < 5; k++) {
              const la =
                linePhase +
                (k / 5) * TAU +
                Math.sin(now * 0.006 + k * 1.3) * 0.5;
              const lLen =
                (20 + k * 4 + Math.sin(now * 0.011 + k) * 5) * breathe;
              const lx1 = cx + Math.cos(la) * 12 * breathe;
              const ly1 = cy + Math.sin(la) * 12 * breathe;
              const lx2 = cx + Math.cos(la) * lLen;
              const ly2 = cy + Math.sin(la) * lLen;
              ctx.beginPath();
              ctx.moveTo(lx1, ly1);
              ctx.lineTo(lx2, ly2);
              ctx.lineWidth = (1.4 + k * 0.14) * breathe;
              ctx.strokeStyle = `rgba(160,200,245,${(0.32 - k * 0.04) * breathe})`;
              ctx.stroke();
            }

            /* Mid steel-blue sphere body */
            const mg = ctx.createRadialGradient(
              cx - 3 * breathe,
              cy - 3 * breathe,
              0,
              cx,
              cy,
              32 * breathe,
            );
            mg.addColorStop(0, `rgba(200,220,252,0.92)`);
            mg.addColorStop(0.18, `rgba(140,185,235,0.82)`);
            mg.addColorStop(0.42, `rgba(70,120,195,0.68)`);
            mg.addColorStop(0.7, `rgba(30,60,130,0.38)`);
            mg.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = mg;
            ctx.beginPath();
            ctx.arc(cx, cy, 32 * breathe, 0, TAU);
            ctx.fill();

            /* Inner dense energy capsule */
            const ig = ctx.createRadialGradient(
              cx - 2 * breathe,
              cy - 2.5 * breathe,
              0,
              cx,
              cy,
              14 * breathe,
            );
            ig.addColorStop(0, `rgba(240,248,255,1)`);
            ig.addColorStop(0.25, `rgba(190,220,252,0.96)`);
            ig.addColorStop(0.55, `rgba(95,148,218,0.72)`);
            ig.addColorStop(0.82, `rgba(42,85,165,0.44)`);
            ig.addColorStop(1, `rgba(10,28,80,0)`);
            ctx.fillStyle = ig;
            ctx.beginPath();
            ctx.arc(cx, cy, 14 * breathe, 0, TAU);
            ctx.fill();

            /* Orbiting feral energy nodes */
            for (const n of orbitNodes) {
              const ox = cx + Math.cos(n.angle) * n.r * breathe;
              const oy = cy + Math.sin(n.angle) * n.r * breathe;
              const pulse = 1 + 0.22 * Math.sin(now * 0.009 + n.phase);
              const sr = n.size * breathe * pulse;
              const ng = ctx.createRadialGradient(ox, oy, 0, ox, oy, sr * 2.2);
              ng.addColorStop(0, `rgba(220,235,255,${0.88 * breathe})`);
              ng.addColorStop(0.4, `rgba(110,170,230,${0.55 * breathe})`);
              ng.addColorStop(1, "rgba(0,0,0,0)");
              ctx.fillStyle = ng;
              ctx.beginPath();
              ctx.arc(ox, oy, sr * 2.2, 0, TAU);
              ctx.fill();
              ctx.fillStyle = `rgba(245,250,255,${0.95 * breathe})`;
              ctx.beginPath();
              ctx.arc(ox, oy, sr * 0.55, 0, TAU);
              ctx.fill();
            }

            /* ── Ambient claws at cursor tip — 3 orbiting claw tips ── */
            const clawOrbitR = 20 * breathe;
            const clawOrbitA = now * 0.0018;
            const AMBIENT_CLAWS = 3;
            for (let k = 0; k < AMBIENT_CLAWS; k++) {
              const ca = clawOrbitA + (k / AMBIENT_CLAWS) * TAU;
              const cox = cx + Math.cos(ca) * clawOrbitR;
              const coy = cy + Math.sin(ca) * clawOrbitR;
              const cAlp = 0.52 * breathe;
              const cLen = 16 * breathe;
              drawClaw(
                cox,
                coy,
                ca + Math.PI * 0.5,
                cLen,
                cLen * 0.24,
                cAlp,
                beastColor,
                0.78,
              );
            }

            /* Bright center core point */
            ctx.fillStyle = `rgba(255,255,255,${breathe * 0.98})`;
            ctx.beginPath();
            ctx.arc(cx, cy, 2.8 * breathe, 0, TAU);
            ctx.fill();
          }

          ctx.globalCompositeOperation = "source-over";

          /* ── HD canvas ambient shimmer ── */
          hctx.clearRect(0, 0, W, H);
          for (let i = 0; i < HDMAX; i++) {
            const h = hdCells[i];
            if (!h.alive) continue;
            h.age += dt;
            if (h.age >= h.life) {
              h.alive = false;
              continue;
            }
            const tp = h.age / h.life;
            const r = h.str * 18 * (1 - tp * 0.36);
            const a = (1 - tp) * 0.086;
            const g = hctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, r);
            g.addColorStop(0, `rgba(80,140,215,${a})`);
            g.addColorStop(0.5, `rgba(30,68,140,${a * 0.42})`);
            g.addColorStop(1, "rgba(0,0,0,0)");
            hctx.fillStyle = g;
            hctx.beginPath();
            hctx.arc(h.x, h.y, r, 0, TAU);
            hctx.fill();
          }
        }

        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
